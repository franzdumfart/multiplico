<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>multiplico - 1x1 üben</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <img src="Images/logo.png" alt="multiplico Logo" class="logo">
        
        <div id="setup-screen">
            <div class="section-title">Welche Reihen möchtest du üben?</div>
            <div class="grid-selection" id="series-selection">
                <!-- Filled via JS -->
            </div>
            
            <div class="section-title">Spielmodus wählen</div>
            <div class="mode-selection">
                <div class="mode-item">
                    <input type="radio" name="game-mode" id="mode-endless" value="endless" checked>
                    <label for="mode-endless" class="mode-label">
                        <strong>Endlos</strong>
                        <span>Kein Zeitlimit</span>
                    </label>
                </div>
                <div class="mode-item">
                    <input type="radio" name="game-mode" id="mode-timed" value="timed">
                    <label for="mode-timed" class="mode-label">
                        <strong>5 Minuten</strong>
                        <span>Zeit läuft ab</span>
                    </label>
                </div>
                <div class="mode-item">
                    <input type="radio" name="game-mode" id="mode-count" value="count">
                    <label for="mode-count" class="mode-label">
                        <strong>10 Fragen</strong>
                        <span>Schnelligkeit zählt</span>
                    </label>
                </div>
                <div class="mode-item">
                    <input type="radio" name="game-mode" id="mode-mistakes" value="mistakes">
                    <label for="mode-mistakes" class="mode-label">
                        <strong>Fehler üben</strong>
                        <span id="mistakes-count-label">Bisher keine Fehler</span>
                    </label>
                </div>
            </div>
            
            <button class="btn-start" id="btn-start">Jetzt üben</button>
            <button class="btn-secondary" id="btn-show-matrix">Meine Erfolgs-Matrix 📊</button>
            <button class="btn-reset" id="btn-reset">Stand zurücksetzen</button>
        </div>

        <div id="practice-screen" class="hidden">
            <div class="session-info">
                <button id="btn-abort" class="btn-small btn-danger">✖ Abbrechen</button>
                <div id="timer-display" class="timer-display">Zeit: 0:00</div>
                <div id="current-score-display">Punkte: 0</div>
            </div>
            
            <div class="question-container">
                <div id="question-counter" class="question-counter"></div>
                <div id="question-text">5 × 3 =</div>
                <input type="number" id="answer-input" placeholder="?">
            </div>

            <div class="numpad">
                <button class="num-btn" data-val="1">1</button>
                <button class="num-btn" data-val="2">2</button>
                <button class="num-btn" data-val="3">3</button>
                <button class="num-btn" data-val="4">4</button>
                <button class="num-btn" data-val="5">5</button>
                <button class="num-btn" data-val="6">6</button>
                <button class="num-btn" data-val="7">7</button>
                <button class="num-btn" data-val="8">8</button>
                <button class="num-btn" data-val="9">9</button>
                <button class="num-btn" data-val="clear">C</button>
                <button class="num-btn" data-val="0">0</button>
                <button class="num-btn" data-val="enter">OK</button>
            </div>
            <div id="feedback" class="feedback"></div>
        </div>

        <div id="score-board" class="score-board">
            <div class="ranking-tabs">
                <button class="tab-btn active" data-tab="timed">5 Minuten Ranking</button>
                <button class="tab-btn" data-tab="count">10 Fragen Ranking</button>
            </div>
            
            <div class="ranking-content">
                <div id="ranking-timed" class="ranking-pane active">
                    <ul id="score-list-timed" class="score-list"></ul>
                </div>
                <div id="ranking-count" class="ranking-pane">
                    <ul id="score-list-count" class="score-list"></ul>
                </div>
            </div>
        </div>

        <!-- Result Modal -->
        <div id="result-modal" class="modal hidden">
            <div class="modal-content">
                <h2>Super gemacht!</h2>
                <div id="result-summary"></div>
                <button id="btn-modal-close" class="btn-start">Nochmal spielen</button>
            </div>
        </div>

        <!-- Matrix Modal -->
        <div id="matrix-modal" class="modal hidden">
            <div class="modal-content modal-large">
                <h2>Deine Erfolgs-Matrix</h2>
                <p class="matrix-info">Hier siehst du, welche Rechnungen du schon richtig gelöst hast! ✨</p>
                <div class="matrix-scroll-container">
                    <table class="progress-matrix" id="progress-matrix">
                        <!-- Filled via JS -->
                    </table>
                </div>
                <button id="btn-matrix-close" class="btn-start" style="margin-top: 20px;">Zurück</button>
            </div>
        </div>
    </div>

    <script>
        const setupScreen = document.getElementById('setup-screen');
        const practiceScreen = document.getElementById('practice-screen');
        const seriesContainer = document.getElementById('series-selection');
        const btnStart = document.getElementById('btn-start');
        const btnReset = document.getElementById('btn-reset');
        const btnShowMatrix = document.getElementById('btn-show-matrix');
        const btnAbort = document.getElementById('btn-abort');
        const scoreBoard = document.getElementById('score-board');
        const scoreListTimed = document.getElementById('score-list-timed');
        const scoreListCount = document.getElementById('score-list-count');
        const tabBtns = document.querySelectorAll('.tab-btn');
        const rankingPanes = document.querySelectorAll('.ranking-pane');
        
        const questionText = document.getElementById('question-text');
        const answerInput = document.getElementById('answer-input');
        const currentScoreDisplay = document.getElementById('current-score-display');
        const timerDisplay = document.getElementById('timer-display');
        const questionCounter = document.getElementById('question-counter');
        const feedback = document.getElementById('feedback');
        const numBtns = document.querySelectorAll('.num-btn');
        
        const resultModal = document.getElementById('result-modal');
        const resultSummary = document.getElementById('result-summary');
        const btnModalClose = document.getElementById('btn-modal-close');
        
        const matrixModal = document.getElementById('matrix-modal');
        const btnMatrixClose = document.getElementById('btn-matrix-close');
        const progressMatrixTable = document.getElementById('progress-matrix');
        
        let sessionScores = JSON.parse(localStorage.getItem('multiplico_scores')) || [];
        let mistakes = JSON.parse(localStorage.getItem('multiplico_mistakes')) || [];
        let solvedProblems = JSON.parse(localStorage.getItem('multiplico_solved')) || {};
        let currentPoints = 0;
        let selectedSeries = [];
        let currentQuestion = { a: 0, b: 0, answer: 0 };
        let currentGameMode = 'endless';
        let questionsAnswered = 0;
        let startTime = 0;
        let timerInterval = null;
        let isActive = false;

        // Tab switching logic
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const tabId = btn.dataset.tab;
                
                tabBtns.forEach(b => b.classList.remove('active'));
                rankingPanes.forEach(p => p.classList.remove('active'));
                
                btn.classList.add('active');
                document.getElementById(`ranking-${tabId}`).classList.add('active');
            });
        });

        // Initialize multiplication series 0 to 10
        for (let i = 0; i <= 10; i++) {
            const item = document.createElement('div');
            item.className = 'checkbox-item';
            
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.id = 'series-' + i;
            checkbox.value = i;
            checkbox.checked = true; // All enabled by default
            
            const label = document.createElement('label');
            label.className = 'checkbox-label';
            label.htmlFor = 'series-' + i;
            label.textContent = i;
            
            item.appendChild(checkbox);
            item.appendChild(label);
            seriesContainer.appendChild(item);
        }

        // Initialize score board
        updateScoreBoard();
        updateMistakesCount();

        btnReset.addEventListener('click', () => {
            if (confirm('Möchtest du wirklich alle deine Punkte, Fehler und deinen Fortschritt löschen? Dies kann nicht rückgängig gemacht werden.')) {
                localStorage.removeItem('multiplico_scores');
                localStorage.removeItem('multiplico_mistakes');
                localStorage.removeItem('multiplico_solved');
                sessionScores = [];
                mistakes = [];
                solvedProblems = {};
                updateScoreBoard();
                updateMistakesCount();
            }
        });

        btnStart.addEventListener('click', () => {
            selectedSeries = Array.from(seriesContainer.querySelectorAll('input:checked'))
                .map(cb => parseInt(cb.value));
            
            currentGameMode = document.querySelector('input[name="game-mode"]:checked').value;

            if (currentGameMode !== 'mistakes' && selectedSeries.length === 0) {
                alert('Bitte wähle mindestens eine Reihe aus!');
                return;
            }

            if (currentGameMode === 'mistakes' && mistakes.length === 0) {
                alert('Du hast noch keine Fehler zum Üben!');
                return;
            }

            startPractice();
        });

        btnAbort.addEventListener('click', () => {
            endSession(true);
        });

        btnModalClose.addEventListener('click', () => {
            resultModal.classList.add('hidden');
            showSetup();
        });

        btnShowMatrix.addEventListener('click', () => {
            renderMatrix();
            matrixModal.classList.remove('hidden');
        });

        btnMatrixClose.addEventListener('click', () => {
            matrixModal.classList.add('hidden');
        });

        // Allow keyboard input and Enter key
        answerInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        function showSetup() {
            setupScreen.classList.remove('hidden');
            practiceScreen.classList.add('hidden');
            scoreBoard.classList.remove('hidden');
        }

        function startPractice() {
            currentPoints = 0;
            questionsAnswered = 0;
            isActive = true;
            updateScoreDisplay();
            
            setupScreen.classList.add('hidden');
            scoreBoard.classList.add('hidden');
            practiceScreen.classList.remove('hidden');
            
            answerInput.focus();
            
            startTimer();
            nextQuestion();
        }

        function startTimer() {
            startTime = Date.now();
            if (timerInterval) clearInterval(timerInterval);
            
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                updateTimerDisplay();
                
                // Mode logic
                if (currentGameMode === 'timed') {
                    const elapsed = Math.floor((Date.now() - startTime) / 1000);
                    const remaining = 300 - elapsed;
                    if (remaining <= 0) {
                        endSession();
                    }
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            
            if (currentGameMode === 'timed') {
                const remaining = Math.max(0, 300 - elapsed);
                const mins = Math.floor(remaining / 60);
                const secs = remaining % 60;
                timerDisplay.textContent = `Zeit: ${mins}:${secs.toString().padStart(2, '0')}`;
                timerDisplay.style.color = remaining < 30 ? '#ff5252' : '';
            } else {
                const mins = Math.floor(elapsed / 60);
                const secs = elapsed % 60;
                timerDisplay.textContent = `Zeit: ${mins}:${secs.toString().padStart(2, '0')}`;
                timerDisplay.style.color = '';
            }
        }

        function nextQuestion() {
            if (!isActive) return;

            // Check if count mode is finished
            if (currentGameMode === 'count' && questionsAnswered >= 10) {
                endSession();
                return;
            }

            // Check if mistakes mode is finished
            if (currentGameMode === 'mistakes' && mistakes.length === 0) {
                endSession();
                return;
            }

            let a, b;
            if (currentGameMode === 'mistakes') {
                const mistake = mistakes[Math.floor(Math.random() * mistakes.length)];
                a = mistake.a;
                b = mistake.b;
            } else {
                a = selectedSeries[Math.floor(Math.random() * selectedSeries.length)];
                b = Math.floor(Math.random() * 11); // 0 to 10
            }

            currentQuestion = { a, b, answer: a * b };
            questionText.textContent = `${a} × ${b} =`;
            answerInput.value = '';
            
            if (currentGameMode === 'count') {
                questionCounter.textContent = `Frage ${questionsAnswered + 1} von 10`;
            } else if (currentGameMode === 'mistakes') {
                questionCounter.textContent = `Fehler zum Üben: ${mistakes.length}`;
            } else {
                questionCounter.textContent = `Frage ${questionsAnswered + 1}`;
            }
            
            answerInput.focus();
        }

        function endSession(aborted = false) {
            isActive = false;
            clearInterval(timerInterval);
            
            if (!aborted && (currentPoints !== 0 || questionsAnswered > 0)) {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const timeStr = `${Math.floor(elapsed / 60)}:${(elapsed % 60).toString().padStart(2, '0')}`;
                
                saveScore({
                    date: new Date().toLocaleTimeString(),
                    points: currentPoints,
                    series: selectedSeries.join(', '),
                    mode: currentGameMode,
                    time: timeStr
                });

                showResults(currentPoints, questionsAnswered, timeStr);
            } else {
                showSetup();
            }
        }

        function showResults(points, count, time) {
            let modeName = 'Endlos';
            if (currentGameMode === 'timed') modeName = '5 Minuten';
            if (currentGameMode === 'count') modeName = '10 Fragen';
            if (currentGameMode === 'mistakes') modeName = 'Fehler üben';

            let summary = `Du hast <strong>${points} Punkte</strong> erreicht!<br><br>`;
            summary += `Beantwortete Fragen: ${count}<br>`;
            summary += `Zeit: ${time}<br>`;
            summary += `Modus: ${modeName}`;
            
            resultSummary.innerHTML = summary;
            resultModal.classList.remove('hidden');
        }

        function updateScoreDisplay() {
            currentScoreDisplay.textContent = `Punkte: ${currentPoints}`;
        }

        numBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const val = btn.dataset.val;
                if (val === 'clear') {
                    answerInput.value = '';
                } else if (val === 'enter') {
                    checkAnswer();
                } else {
                    if (answerInput.value.length < 3) {
                        answerInput.value += val;
                    }
                }
                answerInput.focus();
            });
        });

        function checkAnswer() {
            if (!isActive) return;
            const userAnswer = parseInt(answerInput.value);
            if (isNaN(userAnswer)) return;

            questionsAnswered++;

            if (userAnswer === currentQuestion.answer) {
                currentPoints += 10;
                showFeedback('Richtig! +10', 'correct');
                
                markAsSolved(currentQuestion.a, currentQuestion.b);

                if (currentGameMode === 'mistakes') {
                    removeMistake(currentQuestion.a, currentQuestion.b);
                }
                
                nextQuestion();
            } else {
                currentPoints = Math.max(-500, currentPoints - 10);
                showFeedback(`Falsch! ${currentQuestion.a} × ${currentQuestion.b} = ${currentQuestion.answer}`, 'wrong');
                
                if (currentGameMode !== 'mistakes') {
                    addMistake(currentQuestion.a, currentQuestion.b);
                }
                
                nextQuestion();
            }
            updateScoreDisplay();
        }

        function addMistake(a, b) {
            const exists = mistakes.some(m => m.a === a && m.b === b);
            if (!exists) {
                mistakes.push({ a, b });
                saveMistakes();
            }
        }

        function removeMistake(a, b) {
            mistakes = mistakes.filter(m => !(m.a === a && m.b === b));
            saveMistakes();
        }

        function saveMistakes() {
            localStorage.setItem('multiplico_mistakes', JSON.stringify(mistakes));
            updateMistakesCount();
        }

        function updateMistakesCount() {
            const countLabel = document.getElementById('mistakes-count-label');
            if (mistakes.length === 0) {
                countLabel.textContent = 'Bisher keine Fehler';
            } else {
                countLabel.textContent = `${mistakes.length} Fehler zu üben`;
            }
        }

        function showFeedback(text, type) {
            feedback.textContent = text;
            feedback.className = `feedback ${type}`;
        }

        function saveScore(score) {
            sessionScores.push(score);
            localStorage.setItem('multiplico_scores', JSON.stringify(sessionScores));
            updateScoreBoard();
        }

        function markAsSolved(a, b) {
            // Store both directions (a*b and b*a) as they are the same calculation
            const key1 = `${a}x${b}`;
            const key2 = `${b}x${a}`;
            solvedProblems[key1] = true;
            solvedProblems[key2] = true;
            localStorage.setItem('multiplico_solved', JSON.stringify(solvedProblems));
        }

        function renderMatrix() {
            progressMatrixTable.innerHTML = '';
            
            // Header row
            const headerRow = document.createElement('tr');
            headerRow.appendChild(document.createElement('th')); // Empty corner
            for (let i = 0; i <= 10; i++) {
                const th = document.createElement('th');
                th.textContent = i;
                headerRow.appendChild(th);
            }
            progressMatrixTable.appendChild(headerRow);
            
            // Data rows
            for (let i = 0; i <= 10; i++) {
                const row = document.createElement('tr');
                
                // Row header
                const rowHeader = document.createElement('th');
                rowHeader.textContent = i;
                row.appendChild(rowHeader);
                
                for (let j = 0; j <= 10; j++) {
                    const td = document.createElement('td');
                    const isSolved = solvedProblems[`${i}x${j}`];
                    
                    if (isSolved) {
                        td.className = 'solved';
                        td.textContent = '✓';
                        td.title = `${i} × ${j} = ${i*j}`;
                    } else {
                        td.className = 'unsolved';
                        td.textContent = '';
                        td.title = `${i} × ${j} = ?`;
                    }
                    
                    row.appendChild(td);
                }
                progressMatrixTable.appendChild(row);
            }
        }

        function updateScoreBoard() {
            scoreListTimed.innerHTML = '';
            scoreListCount.innerHTML = '';
            
            // Filter scores: only show top 5 for each mode
            const timedScores = sessionScores.filter(s => s.mode === 'timed')
                .sort((a, b) => b.points - a.points)
                .slice(0, 5);
            
            const countScores = sessionScores.filter(s => s.mode === 'count')
                .sort((a, b) => b.points - a.points)
                .slice(0, 5);

            timedScores.forEach(s => {
                const li = document.createElement('li');
                li.className = 'score-item';
                li.innerHTML = `<span>${s.date} (${s.time})</span> <strong>${s.points} Pkt</strong>`;
                scoreListTimed.appendChild(li);
            });

            countScores.forEach(s => {
                const li = document.createElement('li');
                li.className = 'score-item';
                li.innerHTML = `<span>${s.date} (${s.time})</span> <strong>${s.points} Pkt</strong>`;
                scoreListCount.appendChild(li);
            });

            if (timedScores.length === 0) {
                scoreListTimed.innerHTML = '<li class="score-empty">Noch keine Ergebnisse da. Leg gleich los und hol dir deine ersten Punkte! 🚀</li>';
            }
            if (countScores.length === 0) {
                scoreListCount.innerHTML = '<li class="score-empty">Hier ist es noch leer. Schaffst du es unter die Top 5? Probier es aus! 🌟</li>';
            }
        }
    </script>
</body>
</html>
