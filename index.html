<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>multiplico - 1x1 üben</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <img src="Images/logo.png" alt="multiplico Logo" class="logo">
        <h1>multiplico</h1>
        
        <div id="setup-screen">
            <div class="section-title">Welche Reihen möchtest du üben?</div>
            <div class="grid-selection" id="series-selection">
                <!-- Filled via JS -->
            </div>
            
            <button class="btn-start" id="btn-start">Jetzt üben</button>
        </div>

        <div id="score-board" class="score-board hidden">
            <div class="section-title">Deine Punkte</div>
            <ul id="score-list" class="score-list"></ul>
        </div>
    </div>

    <script>
        const seriesContainer = document.getElementById('series-selection');
        const btnStart = document.getElementById('btn-start');
        const scoreBoard = document.getElementById('score-board');
        const scoreList = document.getElementById('score-list');
        
        let sessionScores = [];

        // Initialize multiplication series 0 to 10
        for (let i = 0; i <= 10; i++) {
            const item = document.createElement('div');
            item.className = 'checkbox-item';
            
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.id = 'series-' + i;
            checkbox.value = i;
            checkbox.checked = true; // All enabled by default
            
            const label = document.createElement('label');
            label.className = 'checkbox-label';
            label.htmlFor = 'series-' + i;
            label.textContent = i;
            
            item.appendChild(checkbox);
            item.appendChild(label);
            seriesContainer.appendChild(item);
        }

        btnStart.addEventListener('click', () => {
            const selectedSeries = Array.from(seriesContainer.querySelectorAll('input:checked'))
                .map(cb => parseInt(cb.value));
            
            if (selectedSeries.length === 0) {
                alert('Please select at least one series!');
                return;
            }

            // The practice session would start here.
            // For now, we simulate a result and save it,
            // as the actual practice UI hasn't been specified yet.
            
            // Mock result for this run
            const mockScore = {
                date: new Date().toLocaleTimeString(),
                points: Math.floor(Math.random() * 10) + 1,
                total: 10
            };
            
            saveScore(mockScore);
        });

        function saveScore(score) {
            sessionScores.push(score);
            updateScoreBoard();
        }

        function updateScoreBoard() {
            scoreBoard.classList.remove('hidden');
            scoreList.innerHTML = '';
            
            // Show latest runs (newest first)
            [...sessionScores].reverse().forEach(s => {
                const li = document.createElement('li');
                li.className = 'score-item';
                li.innerHTML = `<span>${s.date}</span> <strong>${s.points} / ${s.total} Points</strong>`;
                scoreList.appendChild(li);
            });
        }
    </script>
</body>
</html>
